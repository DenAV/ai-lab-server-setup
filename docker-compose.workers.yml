services:
  n8n:
    environment:
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/cca
    volumes:
      - /home/lab/client-conversation-analyzer-data:/data/cca

  ffmpeg-worker:
    build:
      context: ./config/ffmpeg-worker
    image: ai-lab-ffmpeg-worker:latest
    container_name: ffmpeg-worker
    restart: unless-stopped
    environment:
      - DATA_ROOT=/data/cca
    volumes:
      - /home/lab/client-conversation-analyzer-data:/data/cca
    networks:
      - ai-net
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    cpus: "2.0"
    mem_limit: 2g
