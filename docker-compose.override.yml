services:
  n8n:
    build:
      context: ./config/n8n-ffmpeg
      args:
        N8N_VERSION: ${N8N_VERSION:-latest}
    image: ai-lab-n8n-ffmpeg:${N8N_VERSION:-latest}
    environment:
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/cca
    volumes:
      - /home/lab/client-conversation-analyzer-data:/data/cca
